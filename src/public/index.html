<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toio WebAPI テスト UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 16px; }

    /* 接続管理エリア */
    .connection-area {
      margin-bottom: 16px;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .connection-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .connection-header h2 { font-size: 1rem; }
    .cube-list { list-style: none; max-height: 200px; overflow-y: auto; }
    .cube-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: .9rem;
    }
    .cube-item .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }
    .cube-item .cube-name { flex: 1; }
    .cube-item button {
      padding: 3px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: .8rem;
      color: #fff;
      background: #757575;
    }
    .cube-item button:hover { background: #616161; }
    .cube-empty {
      color: #999;
      font-size: .85rem;
      padding: 4px 0;
    }
    #btn-connect {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      color: #fff;
      background: #2196f3;
    }
    #btn-connect:hover { background: #1976d2; }
    #btn-connect:disabled { opacity: .5; cursor: not-allowed; }
    .cube-item .btn-health { background: #4caf50; }
    .cube-item .btn-health:hover { background: #388e3c; }
    .cube-item .btn-health:disabled { opacity: .5; cursor: not-allowed; }
    #btn-cancel-scan {
      display: none;
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      color: #fff;
      background: #f44336;
    }
    #btn-cancel-scan:hover { background: #d32f2f; }
    #btn-cancel-scan.visible { display: inline-block; }

    /* タブ */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab {
      padding: 8px 16px;
      font-size: .85rem;
      cursor: pointer;
      border: none;
      background: none;
      color: #757575;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
    }
    .tab:hover { color: #333; }
    .tab.active {
      color: #2196f3;
      border-bottom-color: #2196f3;
      font-weight: 600;
    }

    /* チャットエリア */
    .chat-input {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      margin-bottom: 16px;
    }
    .chat-input input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
    }
    .chat-input input:focus { border-color: #2196f3; }
    .chat-input button {
      padding: 10px 18px;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .95rem;
      white-space: nowrap;
    }
    .chat-input button:hover { background: #1976d2; }
    .chat-input button:disabled { opacity: .5; cursor: not-allowed; }

    /* ログ */
    .log {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      padding: 12px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .log-entry {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: .9rem;
      line-height: 1.5;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .role {
      font-weight: 600;
      margin-right: 6px;
    }
    .log-entry .role.user { color: #2196f3; }
    .log-entry .role.system { color: #4caf50; }
    .log-entry .role.error { color: #f44336; }
    .log-entry .time {
      color: #999;
      font-size: .75rem;
      margin-right: 6px;
    }
    .log-entry .target-badge {
      font-size: .7rem;
      color: #fff;
      background: #90a4ae;
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 4px;
    }
    .log-empty {
      color: #999;
      text-align: center;
      padding: 24px 0;
    }

    /* 最新結果エリア */
    .latest-result {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      padding: 12px;
      margin-bottom: 8px;
      min-height: 54px;
    }
    .latest-label {
      font-size: .72rem;
      color: #bbb;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .latest-empty { color: #bbb; font-size: .9rem; padding: 6px 0; }
    .latest-content { font-size: .95rem; line-height: 1.5; }

    /* ログトグルボタン */
    .log-toggle {
      width: 100%;
      text-align: left;
      padding: 7px 12px;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .82rem;
      color: #666;
      margin-bottom: 4px;
    }
    .log-toggle:hover:not(:disabled) { background: #e8e8e8; }
    .log-toggle:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <h1>toio WebAPI テスト</h1>

  <!-- 接続管理 -->
  <div class="connection-area">
    <div class="connection-header">
      <h2>接続管理</h2>
      <button id="btn-cancel-scan">キャンセル</button>
      <button id="btn-connect">+ 接続追加</button>
    </div>
    <ul class="cube-list" id="cube-list">
      <li class="cube-empty">接続中の cube はありません</li>
    </ul>
  </div>

  <!-- 送信先タブ + チャット -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-cube-id="all">すべて</button>
  </div>
  <div class="chat-input">
    <input type="text" id="msg-input" placeholder="toio への指示を入力…" />
    <button id="btn-send">送信</button>
  </div>

  <!-- 最新結果 -->
  <div class="latest-result" id="latest-result">
    <div class="latest-label">最新の結果</div>
    <div class="latest-empty">まだ結果がありません</div>
  </div>

  <!-- 過去のログ（折りたたみ） -->
  <button class="log-toggle" id="log-toggle" disabled>過去のログ (0件) ▶</button>
  <div class="log" id="log" hidden></div>

  <script>
    const cubeListEl = document.getElementById("cube-list");
    const tabsEl = document.getElementById("tabs");
    const btnConnect = document.getElementById("btn-connect");
    const btnCancelScan = document.getElementById("btn-cancel-scan");
    const msgInput = document.getElementById("msg-input");
    const btnSend = document.getElementById("btn-send");
    const logEl = document.getElementById("log");
    const latestResultEl = document.getElementById("latest-result");
    const logToggleBtn = document.getElementById("log-toggle");

    let cubes = [];          // [{ id, localName, address }]
    let activeTab = "all";   // 選択中の送信先
    let logCount = 0;
    let healthResults = {};  // { [cubeId]: { healthy, battery } }

    function now() {
      return new Date().toLocaleTimeString("ja-JP", { hour12: false });
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function shortName(cube) {
      if (cube.localName) {
        // "toio Core Cube-XXXX" → "Cube-XXXX"
        const m = cube.localName.match(/Cube-\w+$/);
        return m ? m[0] : cube.localName;
      }
      return cube.id.slice(0, 8);
    }

    function appendLog(role, text, targetLabel) {
      const badge = targetLabel
        ? `<span class="target-badge">${escapeHtml(targetLabel)}</span>`
        : "";
      const roleLabel = role === "user" ? "You" : role === "error" ? "Error" : "toio";
      const entryHtml =
        `<span class="time">${now()}</span>` +
        `<span class="role ${role}">${roleLabel}:</span>` +
        `<span>${escapeHtml(text)}</span>${badge}`;

      // 最新結果を更新
      latestResultEl.innerHTML =
        `<div class="latest-label">最新の結果</div>` +
        `<div class="latest-content log-entry" style="border:none;padding:0">${entryHtml}</div>`;

      // 過去ログに追記
      const entry = document.createElement("div");
      entry.className = "log-entry";
      entry.innerHTML = entryHtml;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;

      // トグルボタン更新
      logCount++;
      const open = !logEl.hidden;
      logToggleBtn.disabled = false;
      logToggleBtn.textContent = `過去のログ (${logCount}件) ${open ? "▲" : "▶"}`;
    }

    logToggleBtn.addEventListener("click", () => {
      logEl.hidden = !logEl.hidden;
      logToggleBtn.textContent = `過去のログ (${logCount}件) ${logEl.hidden ? "▶" : "▲"}`;
    });

    async function safeJson(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        return { error: `${res.status}: ${text}` };
      }
    }

    // --- cube リスト描画 ---
    function renderCubeList() {
      if (cubes.length === 0) {
        cubeListEl.innerHTML = '<li class="cube-empty">接続中の cube はありません</li>';
        return;
      }
      cubeListEl.innerHTML = cubes
        .map(
          (c) => {
            const hr = healthResults[c.id];
            const dotColor = hr ? (hr.healthy ? "#4caf50" : "#f44336") : "#4caf50";
            const batteryText = hr && hr.battery != null ? ` [${hr.battery}%]` : "";
            return `<li class="cube-item" id="cube-item-${c.id}">
              <span class="dot" style="background:${dotColor}"></span>
              <span class="cube-name">${escapeHtml(c.localName ?? c.id)} (${escapeHtml(c.address)})${batteryText}</span>
              <button class="btn-health" id="health-btn-${c.id}" onclick="checkCubeHealth('${c.id}')">ヘルスチェック</button>
              <button onclick="disconnectCube('${c.id}')">切断</button>
            </li>`;
          },
        )
        .join("");
    }

    // --- タブ描画 ---
    function renderTabs() {
      // 「すべて」タブは常に存在
      let html = `<button class="tab${activeTab === "all" ? " active" : ""}" data-cube-id="all">すべて</button>`;
      for (const c of cubes) {
        const name = shortName(c);
        const isActive = activeTab === c.id;
        html += `<button class="tab${isActive ? " active" : ""}" data-cube-id="${c.id}">${escapeHtml(name)}</button>`;
      }
      tabsEl.innerHTML = html;

      // activeTab が消えた cube を指している場合は「すべて」に戻す
      if (activeTab !== "all" && !cubes.find((c) => c.id === activeTab)) {
        activeTab = "all";
        renderTabs();
      }
    }

    tabsEl.addEventListener("click", (e) => {
      const tab = e.target.closest(".tab");
      if (!tab) return;
      activeTab = tab.dataset.cubeId;
      renderTabs();
    });

    // --- ヘルスチェック ---
    async function pollHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await safeJson(res);
        const newIds = (data.cubes ?? []).map(c => c.id);
        const oldIds = cubes.map(c => c.id);
        if (newIds.length !== oldIds.length || newIds.some((id, i) => id !== oldIds[i])) {
          healthResults = {};
        }
        cubes = data.cubes ?? [];
        renderCubeList();
        renderTabs();
      } catch {
        cubes = [];
        renderCubeList();
        renderTabs();
      }
    }
    setInterval(pollHealth, 3000);
    pollHealth();

    // --- 接続 ---
    btnConnect.addEventListener("click", async () => {
      btnConnect.disabled = true;
      btnCancelScan.classList.add("visible");
      appendLog("system", "スキャン中…");
      try {
        const res = await fetch("/api/tools/connect", { method: "POST" });
        const data = await safeJson(res);
        if (data.error) {
          appendLog("error", data.error);
        } else {
          appendLog("system", data.result ?? JSON.stringify(data));
        }
        await pollHealth();
      } catch (e) {
        appendLog("error", e.message);
      } finally {
        btnConnect.disabled = false;
        btnCancelScan.classList.remove("visible");
      }
    });

    // --- スキャンキャンセル ---
    btnCancelScan.addEventListener("click", async () => {
      try {
        await fetch("/api/scan/cancel", { method: "POST" });
        // ログは connect 側のレスポンスで表示されるため、ここでは出さない
      } catch {
        // connect 側で処理される
      } finally {
        btnConnect.disabled = false;
        btnCancelScan.classList.remove("visible");
      }
    });

    // --- per-cube ヘルスチェック ---
    window.checkCubeHealth = async function(cubeId) {
      const btn = document.getElementById(`health-btn-${cubeId}`);
      if (!btn) return;
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = "確認中…";
      try {
        const res = await fetch(`/api/health/check?cubeId=${encodeURIComponent(cubeId)}`);
        const data = await safeJson(res);
        if (data.error) { appendLog("error", data.error); return; }
        const r = data.results[0];
        if (!r) { appendLog("error", "ヘルスチェック結果が取得できなかった。"); return; }
        const name = r.localName ?? r.id;
        if (r.healthy) {
          appendLog("system", `${name}: 正常 (バッテリー ${r.battery}%)`);
          fetch("/api/tools/play_preset_sound", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cubeId, soundId: 0 }),
          }).catch(() => {});
        } else {
          appendLog("error", `${name}: 応答なし (${r.error ?? "不明"})`);
        }
        healthResults[r.id] = { healthy: r.healthy, battery: r.battery };
        const item = document.getElementById(`cube-item-${cubeId}`);
        if (item) {
          const dot = item.querySelector(".dot");
          const nameSpan = item.querySelector(".cube-name");
          if (dot) dot.style.background = r.healthy ? "#4caf50" : "#f44336";
          if (nameSpan) {
            const cube = cubes.find(c => c.id === cubeId);
            if (cube) {
              const batteryText = r.battery != null ? ` [${r.battery}%]` : "";
              nameSpan.textContent = `${cube.localName ?? cube.id} (${cube.address})${batteryText}`;
            }
          }
        }
      } catch (e) {
        appendLog("error", e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    };

    // --- 切断 ---
    window.disconnectCube = async function (cubeId) {
      try {
        const res = await fetch("/api/tools/disconnect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cubeId }),
        });
        const data = await safeJson(res);
        if (data.error) {
          appendLog("error", data.error);
        } else {
          appendLog("system", data.result ?? JSON.stringify(data));
        }
        await pollHealth();
      } catch (e) {
        appendLog("error", e.message);
      }
    };

    // --- チャット送信 ---
    function getTargetLabel() {
      if (activeTab === "all") return cubes.length > 1 ? "すべて" : null;
      const c = cubes.find((c) => c.id === activeTab);
      return c ? shortName(c) : null;
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      appendLog("user", text, getTargetLabel());
      msgInput.value = "";
      btnSend.disabled = true;

      try {
        const payload = { message: text, cubeId: activeTab };
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await safeJson(res);

        if (data.error) {
          appendLog("error", data.error);
        } else if (data.type === "text") {
          appendLog("system", data.result);
        } else if (data.type === "function_call") {
          for (const r of data.results) {
            appendLog("system", `[${r.tool}] ${r.result}`);
          }
        } else {
          appendLog("system", JSON.stringify(data));
        }
      } catch (e) {
        appendLog("error", e.message);
      } finally {
        btnSend.disabled = false;
        msgInput.focus();
      }
    }

    btnSend.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.isComposing) sendMessage();
    });
  </script>
</body>
</html>

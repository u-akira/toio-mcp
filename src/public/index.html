<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toio WebAPI テスト UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 16px; }

    /* 接続エリア */
    .connection {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #4caf50; }
    .status-text { font-size: .9rem; flex: 1; }
    .connection button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      color: #fff;
    }
    #btn-connect { background: #2196f3; }
    #btn-connect:hover { background: #1976d2; }
    #btn-disconnect { background: #757575; }
    #btn-disconnect:hover { background: #616161; }
    .connection button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* チャットエリア */
    .chat-input {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .chat-input input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
    }
    .chat-input input:focus { border-color: #2196f3; }
    .chat-input button {
      padding: 10px 18px;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .95rem;
      white-space: nowrap;
    }
    .chat-input button:hover { background: #1976d2; }
    .chat-input button:disabled { opacity: .5; cursor: not-allowed; }

    /* ログ */
    .log {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      padding: 12px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .log-entry {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: .9rem;
      line-height: 1.5;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .role {
      font-weight: 600;
      margin-right: 6px;
    }
    .log-entry .role.user { color: #2196f3; }
    .log-entry .role.system { color: #4caf50; }
    .log-entry .role.error { color: #f44336; }
    .log-entry .time {
      color: #999;
      font-size: .75rem;
      margin-right: 6px;
    }
    .log-empty {
      color: #999;
      text-align: center;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <h1>toio WebAPI テスト</h1>

  <!-- 接続エリア -->
  <div class="connection">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">未接続</span>
    <button id="btn-connect">接続</button>
    <button id="btn-disconnect">切断</button>
  </div>

  <!-- チャットエリア -->
  <div class="chat-input">
    <input type="text" id="msg-input" placeholder="toio への指示を入力…" />
    <button id="btn-send">送信</button>
  </div>

  <!-- レスポンスログ -->
  <div class="log" id="log">
    <div class="log-empty">ログはまだありません</div>
  </div>

  <script>
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const btnConnect = document.getElementById("btn-connect");
    const btnDisconnect = document.getElementById("btn-disconnect");
    const msgInput = document.getElementById("msg-input");
    const btnSend = document.getElementById("btn-send");
    const logEl = document.getElementById("log");

    let connected = false;
    let logEmpty = true;

    function now() {
      return new Date().toLocaleTimeString("ja-JP", { hour12: false });
    }

    function appendLog(role, text) {
      if (logEmpty) {
        logEl.innerHTML = "";
        logEmpty = false;
      }
      const entry = document.createElement("div");
      entry.className = "log-entry";
      entry.innerHTML =
        `<span class="time">${now()}</span>` +
        `<span class="role ${role}">${role === "user" ? "You" : role === "error" ? "Error" : "toio"}:</span>` +
        `<span>${escapeHtml(text)}</span>`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    /** レスポンスを安全に JSON パースする。非 JSON の場合はエラーオブジェクトを返す */
    async function safeJson(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        return { error: `${res.status}: ${text}` };
      }
    }

    function updateStatus(isConnected) {
      connected = isConnected;
      statusDot.classList.toggle("connected", connected);
      statusText.textContent = connected ? "接続中" : "未接続";
    }

    // ヘルスチェックでポーリング
    async function pollHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await safeJson(res);
        updateStatus(data.connected);
      } catch {
        updateStatus(false);
      }
    }
    setInterval(pollHealth, 3000);
    pollHealth();

    // 接続
    btnConnect.addEventListener("click", async () => {
      btnConnect.disabled = true;
      appendLog("system", "接続中…");
      try {
        const res = await fetch("/api/tools/connect", { method: "POST" });
        const data = await safeJson(res);
        if (data.error) {
          appendLog("error", data.error);
        } else {
          appendLog("system", data.result ?? JSON.stringify(data));
        }
        await pollHealth();
      } catch (e) {
        appendLog("error", e.message);
      } finally {
        btnConnect.disabled = false;
      }
    });

    // 切断
    btnDisconnect.addEventListener("click", async () => {
      btnDisconnect.disabled = true;
      try {
        const res = await fetch("/api/tools/disconnect", { method: "POST" });
        const data = await safeJson(res);
        if (data.error) {
          appendLog("error", data.error);
        } else {
          appendLog("system", data.result ?? JSON.stringify(data));
        }
        await pollHealth();
      } catch (e) {
        appendLog("error", e.message);
      } finally {
        btnDisconnect.disabled = false;
      }
    });

    // チャット送信
    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      appendLog("user", text);
      msgInput.value = "";
      btnSend.disabled = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await safeJson(res);

        if (data.error) {
          appendLog("error", data.error);
        } else if (data.type === "text") {
          appendLog("system", data.result);
        } else if (data.type === "function_call") {
          for (const r of data.results) {
            appendLog("system", `[${r.tool}] ${r.result}`);
          }
        } else {
          appendLog("system", JSON.stringify(data));
        }
      } catch (e) {
        appendLog("error", e.message);
      } finally {
        btnSend.disabled = false;
        msgInput.focus();
      }
    }

    btnSend.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.isComposing) sendMessage();
    });
  </script>
</body>
</html>
